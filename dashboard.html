<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Manager – Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <span>UI Manager</span>
      <small>Website Conversion Tool</small>
    </div>

    <nav id="sidebar-nav">
      <div class="nav-section">Elementit</div>
      <a href="#elements" class="nav-link active" data-view="elements">
        <i class="fa fa-layer-group"></i> Omat elementit
      </a>
      <a href="#templates" class="nav-link" id="nav-templates">
        <i class="fa fa-magic"></i> Templates
      </a>

      <div class="nav-section" style="margin-top:12px">Hallinta</div>
      <a href="#analytics" class="nav-link" data-view="analytics">
        <i class="fa fa-chart-bar"></i> Tilastot
      </a>
      <a href="#leads" class="nav-link" data-view="leads">
        <i class="fa fa-inbox"></i> Liidit
      </a>
      <a href="#settings" class="nav-link" data-view="settings">
        <i class="fa fa-code"></i> Asennuskoodi
      </a>
      <a href="#help" class="nav-link" data-view="help">
        <i class="fa fa-question-circle"></i> Ohjeet
      </a>
      <a href="/admin-users.html" class="nav-link" id="nav-admin" style="display:none">
        <i class="fa fa-shield-alt"></i> Admin-paneeli
      </a>
    </nav>

    <div class="sidebar-footer">
      <img id="user-avatar" src="/placeholder-avatar.png" alt="avatar" onerror="this.style.display='none'">
      <div class="user-info">
        <div class="user-name" id="user-name">Ladataan...</div>
        <div class="user-role" id="user-role"></div>
      </div>
      <button class="logout-btn" id="logout-btn" title="Kirjaudu ulos">
        <i class="fa fa-sign-out-alt"></i>
      </button>
    </div>
  </aside>

  <!-- Pääsisältö -->
  <div id="main">
    <header id="topbar">
      <h1 id="topbar-title">Omat elementit</h1>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" id="btn-refresh" title="Päivitä">
          <i class="fa fa-sync-alt"></i>
        </button>
        <div style="position:relative">
          <button class="btn btn-primary" id="btn-create">
            <i class="fa fa-plus"></i> Luo uusi
          </button>
          <div id="type-picker-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9000;align-items:center;justify-content:center">
            <div style="background:#fff;border-radius:16px;padding:28px;width:560px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,0.25)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
                <h3 style="font-size:16px;font-weight:700;color:#0f172a;margin:0">Valitse elementtityyppi</h3>
                <button id="type-picker-close" style="background:none;border:none;font-size:20px;color:#94a3b8;cursor:pointer;line-height:1;padding:0">✕</button>
              </div>
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
                <button class="type-card" data-type="sticky_bar">
                  <div style="font-size:28px;margin-bottom:6px">📌</div>
                  <div style="font-weight:700;font-size:13px;color:#0f172a">Sticky Bar</div>
                  <div style="font-size:11px;color:#64748b;margin-top:3px;line-height:1.3">Kiinteä palkki sivun ylä- tai alareunassa</div>
                </button>
                <button class="type-card" data-type="popup">
                  <div style="font-size:28px;margin-bottom:6px">💬</div>
                  <div style="font-weight:700;font-size:13px;color:#0f172a">Popup</div>
                  <div style="font-size:11px;color:#64748b;margin-top:3px;line-height:1.3">Ponnahdusikkuna näytön keskellä</div>
                </button>
                <button class="type-card" data-type="slide_in">
                  <div style="font-size:28px;margin-bottom:6px">◀</div>
                  <div style="font-weight:700;font-size:13px;color:#0f172a">Slide-in</div>
                  <div style="font-size:11px;color:#64748b;margin-top:3px;line-height:1.3">Sivusta liukuva elementti</div>
                </button>
                <button class="type-card" data-type="fab">
                  <div style="font-size:28px;margin-bottom:6px">🎯</div>
                  <div style="font-weight:700;font-size:13px;color:#0f172a">Floating Button</div>
                  <div style="font-size:11px;color:#64748b;margin-top:3px;line-height:1.3">Leijuva painike sivun kulmassa</div>
                </button>
                <button class="type-card" data-type="lead_form">
                  <div style="font-size:28px;margin-bottom:6px">📋</div>
                  <div style="font-weight:700;font-size:13px;color:#0f172a">Lead Form</div>
                  <div style="font-size:11px;color:#64748b;margin-top:3px;line-height:1.3">Kerää yhteystietoja lomakkeella</div>
                </button>
                <button class="type-card" data-type="stats_only">
                  <div style="font-size:28px;margin-bottom:6px">👁️</div>
                  <div style="font-weight:700;font-size:13px;color:#0f172a">Tilastot</div>
                  <div style="font-size:11px;color:#64748b;margin-top:3px;line-height:1.3">Näkymätön kävijäseuranta</div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main id="content">
      <!-- Elementtilista -->
      <div id="view-elements">
        <div id="editor-panel"></div>
        <div id="quota-bar" style="margin-top:16px"></div>
        <div id="elements-filter-bar" style="margin-top:8px"></div>
        <div id="elements-grid" class="elements-grid" style="margin-top:8px"></div>
      </div>

      <!-- Tilastot -->
      <div id="view-analytics" style="display:none">
        <div id="analytics-content"></div>
      </div>

      <!-- Ohjeet -->
      <div id="view-help" style="display:none">
        <div id="help-content"></div>
      </div>

      <!-- Asennuskoodi -->
      <div id="view-settings" style="display:none">
        <div style="max-width:660px">
          <!-- otsikko renderöidään renderInstallSection:ssa -->
          <div id="install-section"></div>
          <div id="notifications-section" style="margin-top:32px"></div>
        </div>
      </div>

      <!-- Liidit -->
      <div id="view-leads" style="display:none">
        <div id="leads-content"></div>
      </div>
    </main>
  </div>

  <!-- Modaali-kontti -->
  <div id="modal-root"></div>

  <!-- Inline-tyylit -->
  <style>
    .type-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 10px; border: 2px solid #e2e8f0;
      background: #fff; border-radius: 12px; cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .type-card:hover {
      border-color: #3b82f6; background: #eff6ff;
      transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59,130,246,0.15);
    }
  </style>

  <script type="module" src="js/dashboard/dashboard-main.js"></script>
</body>
</html>
