<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – UI Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #0f172a; min-height: 100vh; }

    /* Header */
    .admin-header {
      background: #1e293b; color: #fff; padding: 0 24px;
      height: 56px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .admin-header a { color: #94a3b8; text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
    .admin-header a:hover { color: #fff; }
    .admin-header h1 { font-size: 15px; font-weight: 700; flex: 1; text-align: center; }
    .admin-badge { background: #ef4444; color: #fff; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }

    /* Summary cards */
    .summary-bar { display: flex; gap: 12px; padding: 20px 24px 0; flex-wrap: wrap; }
    .summary-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
      min-width: 140px; flex: 1;
    }
    .summary-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .summary-val { font-size: 22px; font-weight: 700; line-height: 1; }
    .summary-lbl { font-size: 11px; color: #64748b; margin-top: 2px; }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; padding: 16px 24px; align-items: center; flex-wrap: wrap; }
    .search-box { position: relative; flex: 1; min-width: 200px; }
    .search-box input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-family: inherit; outline: none; background: #fff; }
    .search-box input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .search-box i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 13px; }
    .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { padding: 6px 14px; border-radius: 99px; border: 1px solid #e2e8f0; background: #fff; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .pill:hover { border-color: #3b82f6; color: #3b82f6; }
    .pill.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .btn-refresh { padding: 8px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
    .btn-refresh:hover { background: #e2e8f0; }

    /* User grid */
    .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; padding: 0 24px 32px; }

    /* User card */
    .user-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 14px;
      padding: 18px; transition: box-shadow 0.2s;
    }
    .user-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .user-card.pending { border-left: 4px solid #f59e0b; }
    .user-card.admin-card { border-left: 4px solid #3b82f6; }

    .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #e2e8f0; flex-shrink: 0; }
    .user-name { font-size: 14px; font-weight: 600; color: #0f172a; }
    .user-email { font-size: 12px; color: #64748b; margin-top: 1px; }
    .role-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; flex-shrink: 0; }
    .role-admin   { background: #dbeafe; color: #1d4ed8; }
    .role-user    { background: #dcfce7; color: #15803d; }
    .role-pending { background: #fef3c7; color: #b45309; }

    /* Stats row */
    .card-stats { display: flex; gap: 8px; margin-bottom: 14px; }
    .card-stat { flex: 1; background: #f8fafc; border-radius: 8px; padding: 8px 10px; text-align: center; }
    .card-stat-val { font-size: 16px; font-weight: 700; color: #0f172a; }
    .card-stat-lbl { font-size: 10px; color: #64748b; margin-top: 1px; }

    /* Tier bar */
    .tier-bar { margin-bottom: 14px; }
    .tier-label { font-size: 11px; color: #64748b; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .tier-progress { height: 5px; background: #e2e8f0; border-radius: 3px; }
    .tier-fill { height: 5px; border-radius: 3px; background: #3b82f6; transition: width 0.3s; }

    /* Preset buttons */
    .preset-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .preset-btn { flex: 1; padding: 7px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #f8fafc; cursor: pointer; font-size: 11px; font-weight: 700; transition: all 0.15s; }
    .preset-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .preset-free   { color: #475569; }
    .preset-free:hover   { border-color: #475569; background: #f1f5f9; }
    .preset-pro    { border-color: #3b82f6; color: #1d4ed8; background: #eff6ff; }
    .preset-pro:hover    { background: #dbeafe; }
    .preset-agency { border-color: #8b5cf6; color: #6d28d9; background: #f5f3ff; }
    .preset-agency:hover { background: #ede9fe; }

    /* Actions row */
    .card-actions { display: flex; gap: 8px; align-items: center; }
    .role-select { flex: 1; padding: 7px 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 12px; font-family: inherit; cursor: pointer; outline: none; }
    .role-select:focus { border-color: #3b82f6; }
    .btn-action { padding: 7px 12px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
    .btn-edit-limits { background: #f8fafc; border: 1px solid #e2e8f0; color: #475569; }
    .btn-edit-limits:hover { background: #e2e8f0; }
    .btn-delete { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .btn-delete:hover { background: #fee2e2; }
    .btn-approve { background: #dcfce7; border: 1px solid #bbf7d0; color: #15803d; }
    .btn-approve:hover { background: #bbf7d0; }

    /* Toast */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 9999; transition: transform 0.3s; pointer-events: none; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { background: #ef4444; }

    /* Empty/Loading */
    .state-msg { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }

    /* Limits modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: #fff; border-radius: 16px; padding: 28px; width: 480px; max-width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.2); }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .modal-sub { font-size: 12px; color: #64748b; margin-bottom: 20px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .modal-field label { font-size: 11px; color: #64748b; display: block; margin-bottom: 4px; font-weight: 500; text-transform: capitalize; }
    .modal-field input[type=number] { width: 100%; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; }
    .modal-field input[type=number]:focus { outline: none; border-color: #3b82f6; }
    .modal-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .modal-check { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
    .modal-check input { accent-color: #3b82f6; width: 15px; height: 15px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-modal-cancel { padding: 9px 18px; border: 1px solid #e2e8f0; border-radius: 9px; background: #fff; cursor: pointer; font-size: 13px; }
    .btn-modal-save { padding: 9px 20px; border: none; border-radius: 9px; background: #3b82f6; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-modal-save:hover { background: #2563eb; }

    /* Tabs */
    .admin-tabs { display: flex; gap: 0; padding: 0 24px; border-bottom: 2px solid #e2e8f0; margin-top: 16px; }
    .admin-tab { padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: #64748b; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .admin-tab:hover { color: #3b82f6; }
    .admin-tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }

    /* Audit log */
    #audit-view { padding: 0 24px 32px; display: none; }
    .audit-toolbar { display: flex; gap: 10px; padding: 16px 0; align-items: center; flex-wrap: wrap; }
    .audit-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; font-size: 12px; }
    .audit-table th { background: #f8fafc; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #e2e8f0; }
    .audit-table td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    .audit-table tr:last-child td { border-bottom: none; }
    .audit-table tr:hover td { background: #f8fafc; }
    .action-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; }
    .act-login        { background: #dcfce7; color: #15803d; }
    .act-user_approved{ background: #dbeafe; color: #1d4ed8; }
    .act-role_change  { background: #fef3c7; color: #b45309; }
    .act-user_deleted { background: #fee2e2; color: #dc2626; }
    .act-limits_updated { background: #f5f3ff; color: #6d28d9; }
    .act-tier_preset  { background: #f0fdf4; color: #15803d; }
    .audit-pagination { display: flex; align-items: center; gap: 8px; padding: 14px 0; font-size: 12px; color: #64748b; }
    .audit-page-btn { padding: 5px 12px; border: 1px solid #e2e8f0; border-radius: 7px; background: #fff; cursor: pointer; font-size: 12px; }
    .audit-page-btn:hover { background: #f1f5f9; }
    .audit-page-btn:disabled { opacity: 0.4; cursor: default; }

    @media (max-width: 600px) {
      .summary-bar { padding: 12px; }
      .toolbar { padding: 12px; }
      .users-grid { padding: 0 12px 24px; }
      .users-grid { grid-template-columns: 1fr; }
      .admin-tabs { padding: 0 12px; }
      #audit-view { padding: 0 12px 24px; }
    }
  </style>
</head>
<body>

<header class="admin-header">
  <a href="/dashboard"><i class="fa fa-arrow-left"></i> Dashboard</a>
  <h1><i class="fa fa-shield-alt" style="color:#60a5fa;margin-right:6px"></i>Admin-paneeli</h1>
  <span class="admin-badge">ADMIN</span>
</header>

<!-- Navigointitabit -->
<div class="admin-tabs">
  <button class="admin-tab active" data-tab="users"><i class="fa fa-users"></i> Käyttäjät</button>
  <button class="admin-tab" data-tab="audit"><i class="fa fa-history"></i> Audit-loki</button>
</div>

<div id="users-view">
<div class="summary-bar" id="summary-bar">
  <div class="summary-card">
    <div class="summary-icon" style="background:#dbeafe"><i class="fa fa-users" style="color:#3b82f6"></i></div>
    <div><div class="summary-val" id="s-total">–</div><div class="summary-lbl">Käyttäjät yhteensä</div></div>
  </div>
  <div class="summary-card">
    <div class="summary-icon" style="background:#fef3c7"><i class="fa fa-clock" style="color:#f59e0b"></i></div>
    <div><div class="summary-val" id="s-pending">–</div><div class="summary-lbl">Odottaa hyväksyntää</div></div>
  </div>
  <div class="summary-card">
    <div class="summary-icon" style="background:#dcfce7"><i class="fa fa-check-circle" style="color:#10b981"></i></div>
    <div><div class="summary-val" id="s-active">–</div><div class="summary-lbl">Aktiivisia käyttäjiä</div></div>
  </div>
  <div class="summary-card">
    <div class="summary-icon" style="background:#f5f3ff"><i class="fa fa-layer-group" style="color:#8b5cf6"></i></div>
    <div><div class="summary-val" id="s-elements">–</div><div class="summary-lbl">Elementtejä yhteensä</div></div>
  </div>
</div>

<div class="toolbar">
  <div class="search-box">
    <i class="fa fa-search"></i>
    <input type="text" id="search-input" placeholder="Hae nimellä tai sähköpostilla…">
  </div>
  <div class="filter-pills">
    <button class="pill active" data-filter="all">Kaikki</button>
    <button class="pill" data-filter="pending">⏳ Odottaa</button>
    <button class="pill" data-filter="user">Käyttäjät</button>
    <button class="pill" data-filter="admin">Admin</button>
  </div>
  <button class="btn-refresh" id="btn-refresh"><i class="fa fa-sync"></i> Päivitä</button>
</div>

<div class="users-grid" id="users-grid">
  <div class="state-msg"><i class="fa fa-spinner fa-spin"></i> Ladataan käyttäjiä…</div>
</div>

</div><!-- /users-view -->

<!-- Audit-loki-näkymä -->
<div id="audit-view">
  <div class="audit-toolbar">
    <div class="search-box" style="max-width:240px">
      <i class="fa fa-search"></i>
      <input type="text" id="audit-search" placeholder="Hae sähköpostilla…">
    </div>
    <select id="audit-action-filter" style="padding:9px 12px;border:1px solid #e2e8f0;border-radius:9px;font-size:13px;background:#fff;outline:none">
      <option value="">Kaikki tapahtumat</option>
      <option value="login">Kirjautumiset</option>
      <option value="user_approved">Hyväksynnät</option>
      <option value="role_change">Roolin muutokset</option>
      <option value="user_deleted">Poistetut käyttäjät</option>
      <option value="limits_updated">Rajoitusten muutokset</option>
    </select>
    <button class="btn-refresh" id="audit-refresh"><i class="fa fa-sync"></i> Päivitä</button>
    <span id="audit-total" style="font-size:12px;color:#64748b;margin-left:auto"></span>
  </div>

  <table class="audit-table" id="audit-table">
    <thead>
      <tr>
        <th>Aika</th>
        <th>Tapahtuma</th>
        <th>Tekijä</th>
        <th>Kohde</th>
        <th>Lisätiedot</th>
        <th>IP</th>
      </tr>
    </thead>
    <tbody id="audit-tbody">
      <tr><td colspan="6" style="text-align:center;padding:32px;color:#94a3b8"><i class="fa fa-spinner fa-spin"></i> Ladataan…</td></tr>
    </tbody>
  </table>

  <div class="audit-pagination" id="audit-pagination">
    <button class="audit-page-btn" id="audit-prev">← Edellinen</button>
    <span id="audit-page-info"></span>
    <button class="audit-page-btn" id="audit-next">Seuraava →</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
// ─── State ────────────────────────────────────────────────
let allUsers = [];
let filterRole = 'all';
let searchQ = '';
const elementCounts = {};

const PRESETS = {
  free:   { popupLimit:2,   sticky_bar:1,  fab:1,  slide_in:1,  popup:1,  social_proof:1,  scroll_progress:1,  lead_form:0,  canUseTargeting:false, canUseAnalytics:true,  canUseTemplates:true,  canUseAbTest:false, canUseCampaigns:false, canUseWebhooks:false },
  pro:    { popupLimit:20,  sticky_bar:5,  fab:5,  slide_in:5,  popup:5,  social_proof:5,  scroll_progress:5,  lead_form:3,  canUseTargeting:true,  canUseAnalytics:true,  canUseTemplates:true,  canUseAbTest:true,  canUseCampaigns:true,  canUseWebhooks:true  },
  agency: { popupLimit:100, sticky_bar:20, fab:20, slide_in:20, popup:20, social_proof:20, scroll_progress:20, lead_form:10, canUseTargeting:true,  canUseAnalytics:true,  canUseTemplates:true,  canUseAbTest:true,  canUseCampaigns:true,  canUseWebhooks:true  }
};

// ─── Auth guard ───────────────────────────────────────────
const me = await fetch('/api/user').then(r=>r.ok?r.json():null).catch(()=>null);
const currentUser = me?.user || me;
if (!currentUser || currentUser.role !== 'admin') {
  document.body.innerHTML = '<div style="text-align:center;padding:80px;font-size:18px;color:#ef4444">⛔ Ei oikeuksia</div>';
  throw new Error('not admin');
}

// ─── Load data ────────────────────────────────────────────
async function loadAll() {
  const [users, popups] = await Promise.all([
    fetch('/api/admin/users').then(r=>r.json()).catch(()=>[]),
    fetch('/api/admin/popups').then(r=>r.json()).catch(()=>[])
  ]);
  allUsers = Array.isArray(users) ? users : [];

  // Count elements per user
  if (Array.isArray(popups)) {
    popups.forEach(p => {
      const uid = p.userId?.toString?.() || p.userId;
      if (uid) elementCounts[uid] = (elementCounts[uid] || 0) + 1;
    });
  }
  renderSummary();
  renderGrid();
}

function renderSummary() {
  document.getElementById('s-total').textContent   = allUsers.length;
  document.getElementById('s-pending').textContent = allUsers.filter(u=>u.role==='pending').length;
  document.getElementById('s-active').textContent  = allUsers.filter(u=>u.role==='user'||u.role==='admin').length;
  document.getElementById('s-elements').textContent = Object.values(elementCounts).reduce((a,b)=>a+b,0);
}

function getTier(user) {
  if (user.role === 'admin') return null;
  const limit = user.popupLimit ?? 2;
  if (limit >= 50) return { label: 'Agency', cls: 'preset-agency' };
  if (limit >= 10) return { label: 'Pro', cls: 'preset-pro' };
  return { label: 'Free', cls: 'preset-free' };
}

function renderGrid() {
  const grid = document.getElementById('users-grid');
  let filtered = allUsers.filter(u => {
    const matchRole = filterRole === 'all' || u.role === filterRole;
    const matchSearch = !searchQ ||
      (u.displayName||'').toLowerCase().includes(searchQ) ||
      (u.email||'').toLowerCase().includes(searchQ);
    return matchRole && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="state-msg">Ei käyttäjiä haulla.</div>';
    return;
  }

  grid.innerHTML = filtered.map(u => userCard(u)).join('');

  // Events
  grid.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      const { action, id } = btn.dataset;
      const user = allUsers.find(u => u._id === id);
      if (!user) return;
      if (action === 'approve')      handleApprove(user);
      else if (action === 'delete')  handleDelete(user);
      else if (action === 'limits')  openLimitsModal(user);
      else if (action === 'preset')  handlePreset(user, btn.dataset.preset);
    });
  });

  grid.querySelectorAll('.role-select').forEach(sel => {
    sel.addEventListener('change', async e => {
      const user = allUsers.find(u => u._id === sel.dataset.id);
      if (user) await handleRoleChange(user, sel.value);
    });
  });
}

function userCard(u) {
  const isAdmin = u.role === 'admin';
  const elCount = elementCounts[u._id] || 0;
  const limit = u.popupLimit ?? 2;
  const pct = isAdmin ? 0 : Math.min(100, Math.round((elCount / limit) * 100));
  const tier = getTier(u);
  const regDate = u.registeredAt ? new Date(u.registeredAt).toLocaleDateString('fi-FI') : '–';
  const lastLogin = u.lastLogin ? new Date(u.lastLogin).toLocaleDateString('fi-FI') : '–';

  return `
    <div class="user-card ${u.role === 'pending' ? 'pending' : (isAdmin ? 'admin-card' : '')}">
      <div class="card-top">
        <img class="user-avatar" src="${u.profilePicture || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(u.displayName||'?') + '&background=e2e8f0&color=475569'}" alt="">
        <div style="flex:1;min-width:0">
          <div class="user-name">${esc(u.displayName || '–')}</div>
          <div class="user-email">${esc(u.email || '–')}</div>
          <div style="font-size:10px;color:#94a3b8;margin-top:2px">Rekisteröity: ${regDate} · Kirjautui: ${lastLogin}</div>
        </div>
        <span class="role-badge role-${u.role}">${roleIcon(u.role)} ${u.role}</span>
      </div>

      ${!isAdmin ? `
      <div class="card-stats">
        <div class="card-stat">
          <div class="card-stat-val">${elCount}</div>
          <div class="card-stat-lbl">Elementtejä</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-val">${limit}</div>
          <div class="card-stat-lbl">Raja</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-val">${tier ? `<span style="font-size:11px;padding:2px 8px;border-radius:99px;border:1.5px solid currentColor" class="${tier.cls}">${tier.label}</span>` : '–'}</div>
          <div class="card-stat-lbl">Tieri</div>
        </div>
      </div>
      <div class="tier-bar">
        <div class="tier-label"><span>Elementtikäyttö</span><span>${elCount} / ${limit}</span></div>
        <div class="tier-progress"><div class="tier-fill" style="width:${pct}%;background:${pct>=100?'#ef4444':'#3b82f6'}"></div></div>
      </div>

      ${u.role !== 'pending' ? `
      <div class="preset-row">
        <button class="preset-btn preset-free"   data-action="preset" data-id="${u._id}" data-preset="free">Free</button>
        <button class="preset-btn preset-pro"    data-action="preset" data-id="${u._id}" data-preset="pro">⭐ Pro</button>
        <button class="preset-btn preset-agency" data-action="preset" data-id="${u._id}" data-preset="agency">🏢 Agency</button>
      </div>` : ''}
      ` : '<div style="font-size:12px;color:#64748b;margin-bottom:12px">Admin-käyttäjällä ei rajoja.</div>'}

      <div class="card-actions">
        ${u.role === 'pending' ? `
          <button class="btn-action btn-approve" data-action="approve" data-id="${u._id}">
            <i class="fa fa-check"></i> Hyväksy
          </button>` : ''}
        ${!isAdmin ? `
          <select class="role-select" data-id="${u._id}">
            <option value="pending" ${u.role==='pending'?'selected':''}>⏳ Pending</option>
            <option value="user"    ${u.role==='user'?'selected':''}>✅ User</option>
            <option value="admin"   ${u.role==='admin'?'selected':''}>🔑 Admin</option>
          </select>
          <button class="btn-action btn-edit-limits" data-action="limits" data-id="${u._id}" title="Muokkaa rajoituksia">
            <i class="fa fa-sliders-h"></i>
          </button>` : ''}
        <button class="btn-action btn-delete" data-action="delete" data-id="${u._id}" title="Poista käyttäjä" style="margin-left:auto">
          <i class="fa fa-trash"></i>
        </button>
      </div>
    </div>`;
}

// ─── Actions ─────────────────────────────────────────────
async function handleApprove(user) {
  await apiPatch(`/api/admin/users/update-role/${user._id}`, { role: 'user' });
  toast(`✅ ${user.displayName} hyväksytty`);
  await loadAll();
}

async function handleRoleChange(user, role) {
  await apiPatch(`/api/admin/users/update-role/${user._id}`, { role });
  toast(`Rooli päivitetty → ${role}`);
  user.role = role;
  renderGrid();
}

async function handleDelete(user) {
  if (!confirm(`Poistetaanko käyttäjä ${user.displayName} (${user.email})? Tätä ei voi peruuttaa.`)) return;
  const r = await fetch(`/api/admin/users/delete/${user._id}`, { method: 'POST' });
  if (r.ok) { toast('Käyttäjä poistettu'); await loadAll(); }
  else toast('Virhe poistossa', 'error');
}

async function handlePreset(user, preset) {
  const p = PRESETS[preset];
  if (!p) return;
  const r = await fetch(`/api/admin/users/limits/${user._id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(p)
  });
  if (r.ok) {
    toast(`${preset.charAt(0).toUpperCase()+preset.slice(1)}-tieri asetettu käyttäjälle ${user.displayName}`);
    // Update local state
    const idx = allUsers.findIndex(u=>u._id===user._id);
    if (idx>=0) { allUsers[idx].popupLimit = p.popupLimit; allUsers[idx].limits = p; }
    renderGrid();
  } else toast('Virhe tieri-asetuksessa', 'error');
}

// ─── Limits Modal ─────────────────────────────────────────
function openLimitsModal(user) {
  const lim = user.limits || {};
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">Muokkaa rajoituksia</div>
      <div class="modal-sub">${esc(user.displayName)} · ${esc(user.email)}</div>

      <div style="display:flex;gap:8px;margin-bottom:18px">
        <button class="preset-btn preset-free"   data-mp="free">Free</button>
        <button class="preset-btn preset-pro"    data-mp="pro">⭐ Pro</button>
        <button class="preset-btn preset-agency" data-mp="agency">🏢 Agency</button>
      </div>

      <div style="margin-bottom:14px">
        <label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px;font-weight:600">Elementtejä yhteensä (popupLimit)</label>
        <input type="number" id="ml-total" min="0" value="${user.popupLimit??2}" style="width:120px;padding:8px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px">
      </div>

      <div class="modal-grid">
        ${['sticky_bar','fab','slide_in','popup','social_proof','scroll_progress','lead_form'].map(t=>`
          <div class="modal-field">
            <label>${t.replace(/_/g,' ')}</label>
            <input type="number" id="ml-${t}" min="0" max="200" value="${lim[t]??( t==='lead_form'?0:1)}">
          </div>`).join('')}
      </div>

      <div class="modal-checks">
        <label class="modal-check"><input type="checkbox" id="ml-targeting"  ${lim.canUseTargeting ?'checked':''}> Targeting</label>
        <label class="modal-check"><input type="checkbox" id="ml-abtest"     ${lim.canUseAbTest    ?'checked':''}> A/B-testaus</label>
        <label class="modal-check"><input type="checkbox" id="ml-campaigns"  ${lim.canUseCampaigns ?'checked':''}> Kampanjat</label>
        <label class="modal-check"><input type="checkbox" id="ml-webhooks"   ${lim.canUseWebhooks  ?'checked':''}> Webhooks</label>
        <label class="modal-check"><input type="checkbox" id="ml-analytics"  ${lim.canUseAnalytics!==false?'checked':''}> Analytics</label>
        <label class="modal-check"><input type="checkbox" id="ml-templates"  ${lim.canUseTemplates!==false?'checked':''}> Templates</label>
      </div>

      <div class="modal-footer">
        <button class="btn-modal-cancel" id="ml-cancel">Peruuta</button>
        <button class="btn-modal-save"   id="ml-save"><i class="fa fa-save"></i> Tallenna</button>
      </div>
    </div>`;

  document.body.appendChild(backdrop);

  // Preset buttons
  backdrop.querySelectorAll('[data-mp]').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = PRESETS[btn.dataset.mp];
      backdrop.querySelector('#ml-total').value = p.popupLimit;
      ['sticky_bar','fab','slide_in','popup','social_proof','scroll_progress','lead_form'].forEach(t => {
        backdrop.querySelector('#ml-'+t).value = p[t];
      });
      backdrop.querySelector('#ml-targeting').checked  = p.canUseTargeting;
      backdrop.querySelector('#ml-abtest').checked     = p.canUseAbTest;
      backdrop.querySelector('#ml-campaigns').checked  = p.canUseCampaigns;
      backdrop.querySelector('#ml-webhooks').checked   = p.canUseWebhooks;
      backdrop.querySelector('#ml-analytics').checked  = p.canUseAnalytics;
      backdrop.querySelector('#ml-templates').checked  = p.canUseTemplates;
    });
  });

  backdrop.querySelector('#ml-cancel').addEventListener('click', () => backdrop.remove());
  backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.remove(); });

  backdrop.querySelector('#ml-save').addEventListener('click', async () => {
    const g = id => backdrop.querySelector('#' + id);
    const data = {
      popupLimit:      parseInt(g('ml-total').value)        || 2,
      sticky_bar:      parseInt(g('ml-sticky_bar').value)   || 0,
      fab:             parseInt(g('ml-fab').value)           || 0,
      slide_in:        parseInt(g('ml-slide_in').value)      || 0,
      popup:           parseInt(g('ml-popup').value)         || 0,
      social_proof:    parseInt(g('ml-social_proof').value)  || 0,
      scroll_progress: parseInt(g('ml-scroll_progress').value)||0,
      lead_form:       parseInt(g('ml-lead_form').value)     || 0,
      canUseTargeting: g('ml-targeting').checked,
      canUseAbTest:    g('ml-abtest').checked,
      canUseCampaigns: g('ml-campaigns').checked,
      canUseWebhooks:  g('ml-webhooks').checked,
      canUseAnalytics: g('ml-analytics').checked,
      canUseTemplates: g('ml-templates').checked,
    };
    const r = await fetch(`/api/admin/users/limits/${user._id}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
    });
    if (r.ok) {
      toast('Rajoitukset tallennettu ✓');
      const idx = allUsers.findIndex(u=>u._id===user._id);
      if (idx>=0) { allUsers[idx].popupLimit = data.popupLimit; allUsers[idx].limits = data; }
      backdrop.remove();
      renderGrid();
    } else toast('Tallennus epäonnistui', 'error');
  });
}

// ─── UI helpers ───────────────────────────────────────────
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type === 'error' ? 'error' : '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function roleIcon(role) {
  return role === 'admin' ? '🔑' : role === 'user' ? '✅' : '⏳';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function apiPatch(url, body) {
  return fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
}

// ─── Event listeners ──────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  renderGrid();
});

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
    filterRole = p.dataset.filter;
    renderGrid();
  });
});

document.getElementById('btn-refresh').addEventListener('click', loadAll);

// ─── Init ─────────────────────────────────────────────────
await loadAll();

// ─── Tab-navigointi ───────────────────────────────────────
document.querySelectorAll('.admin-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const name = tab.dataset.tab;
    document.getElementById('users-view').style.display = name === 'users' ? 'block' : 'none';
    document.getElementById('audit-view').style.display  = name === 'audit'  ? 'block' : 'none';
    if (name === 'audit') loadAudit();
  });
});

// ─── Audit-loki ───────────────────────────────────────────
let auditPage = 1;
let auditSearch = '';
let auditAction = '';

const ACTION_LABELS = {
  login:          ['🔑 Kirjautuminen', 'act-login'],
  user_approved:  ['✅ Hyväksytty',    'act-user_approved'],
  role_change:    ['🔄 Rooli muuttui', 'act-role_change'],
  user_deleted:   ['🗑️ Poistettu',     'act-user_deleted'],
  limits_updated: ['⚙️ Rajoitukset',   'act-limits_updated'],
  tier_preset:    ['⭐ Tieri',          'act-tier_preset'],
};

function fmtDetails(log) {
  const d = log.details || {};
  if (log.action === 'role_change' || log.action === 'user_approved') {
    return `${d.from || '?'} → <strong>${d.to || '?'}</strong>`;
  }
  if (log.action === 'limits_updated') {
    return `Raja: ${d.popupLimit ?? '?'}`;
  }
  if (log.action === 'user_deleted') {
    return `<span style="color:#dc2626">${esc(d.displayName || d.email || '?')}</span>`;
  }
  if (log.action === 'login') {
    return `Rooli: ${d.role || '?'}`;
  }
  return JSON.stringify(d).substring(0, 60);
}

async function loadAudit() {
  const tbody = document.getElementById('audit-tbody');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:#94a3b8"><i class="fa fa-spinner fa-spin"></i> Ladataan…</td></tr>';

  const params = new URLSearchParams({ page: auditPage, limit: 50 });
  if (auditAction) params.set('action', auditAction);
  if (auditSearch) {
    params.set('adminEmail', auditSearch);
  }

  const data = await fetch('/api/admin/audit-logs?' + params).then(r => r.json()).catch(() => ({ logs: [], total: 0 }));
  const { logs, total, page, pages } = data;

  document.getElementById('audit-total').textContent = `${total} tapahtumaa yhteensä`;
  document.getElementById('audit-page-info').textContent = `Sivu ${page} / ${pages || 1}`;
  document.getElementById('audit-prev').disabled = page <= 1;
  document.getElementById('audit-next').disabled = page >= (pages || 1);

  if (!logs.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:#94a3b8">Ei lokimerkintöjä</td></tr>';
    return;
  }

  tbody.innerHTML = logs.map(log => {
    const [label, cls] = ACTION_LABELS[log.action] || [log.action, 'act-login'];
    const dt = new Date(log.createdAt);
    const dateStr = dt.toLocaleDateString('fi-FI') + ' ' + dt.toLocaleTimeString('fi-FI', { hour: '2-digit', minute: '2-digit' });
    return `<tr>
      <td style="white-space:nowrap;color:#64748b">${dateStr}</td>
      <td><span class="action-badge ${cls}">${label}</span></td>
      <td style="color:#0f172a">${esc(log.adminEmail || '–')}</td>
      <td style="color:#475569">${esc(log.targetEmail || '–')}</td>
      <td style="color:#64748b">${fmtDetails(log)}</td>
      <td style="font-family:monospace;font-size:11px;color:#94a3b8">${esc(log.ip || '–')}</td>
    </tr>`;
  }).join('');
}

document.getElementById('audit-search').addEventListener('input', e => {
  auditSearch = e.target.value.trim();
  auditPage = 1;
  loadAudit();
});
document.getElementById('audit-action-filter').addEventListener('change', e => {
  auditAction = e.target.value;
  auditPage = 1;
  loadAudit();
});
document.getElementById('audit-refresh').addEventListener('click', () => loadAudit());
document.getElementById('audit-prev').addEventListener('click', () => { auditPage--; loadAudit(); });
document.getElementById('audit-next').addEventListener('click', () => { auditPage++; loadAudit(); });
</script>
</body>
</html>
